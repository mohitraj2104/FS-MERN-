<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User form</title>
    <style>
        input, button{
            margin: 5px;
            padding-left: 10px;
            width: 15vw;
            height:30px;
            border: 1px solid lightblue;
            border-radius: 40px;
        }
        /* use div tag and arrange my form properly and design it like a modern form*/

        label{
            font-weight: 600;
        }
    </style>
</head>
<body>
    <form>
        <label for ="user">Name: </label>
        <input type="text" id="user" placeholder="Enter your Name">
        <br>
        <label for ="email">Email: </label>
        <input type="email" id="email" placeholder="Enter your Email">
        <br>
        <label for ="password">Password: </label>
        <input type="password" id="password" placeholder="Enter your Password">
        <br>
        <label for ="phonr Number">Phone Number: </label>
        <input type="tel" id="phone Number" placeholder="Enter your Phone Number">
        <br>
        <label for="Age">Age: </label>
        <input type="number" id="Age" placeholder="Enter your Age">
        <br>
        <label for ="subject">Subject: </label>
        <select id=""subject>
            <option value="">Choose Subjects</option> 
            <option value="maths">Maths</option>
            <option value="science">Science</option>
            <option value="english">English</option>
        </select>
        <br>

        <label for="class">Class: </label>
        <input type="text" name="" id="class" list="class-list">
        <datalist id="class-list">
            <option value="10th"></option>
            <option value="12th"></option>
        </datalist>
        <br>
        <label for="file">File: </label>
        <input type="file" id="file" accept="jpg.png.pdf">
        <br>
        <label for="address">Address: </label>
        <textarea name="address" id="address" placeholder="Enter your Address" cols="30" rows="10"></textarea>
        <button>Submit</button>
        <!-- <hr> -->
    </form>
</body>
</html>
