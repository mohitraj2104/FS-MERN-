<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>

<body>
    <table border="1">
        <caption>Student table</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Roll No.</th>
            </tr>
        </thead>
        <tr>
            <td>Mohit</td>
            <td>20</td>
            <td>2255</td>
        </tr>
        <tr>
            <td>Nil Kamal</td>
            <td>21</td>
            <td>2262</td>
        </tr>
        <tfoot>
            <td rowspan="2">Total</td>
            <td colspan="2">Total Student:2</td>
            <tr>
                <td>Average Age: 20.1</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
